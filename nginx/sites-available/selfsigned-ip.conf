server {
    listen __NGINX_PANEL_PORT__ ssl http2;
    listen [::]:__NGINX_PANEL_PORT__ ssl http2;
    server_name __SERVER_IP__;

    ssl_certificate __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    location = __PANEL_PATH__ {
        return 301 __PANEL_PATH_WITH_SLASH__;
    }

    location ^~ __PANEL_PATH_WITH_SLASH__ {
        proxy_pass http://__PANEL_UPSTREAM__;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        return 404;
    }
}

server {
    listen __NGINX_TEST_PORT__ ssl http2;
    listen [::]:__NGINX_TEST_PORT__ ssl http2;
    server_name __SERVER_IP__;

    ssl_certificate __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    root /var/www/html;
    index index.nginx-debian.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
